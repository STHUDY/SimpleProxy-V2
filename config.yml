config:
  timeout: 5
  pollingIntervalMs: 1000
  tls: 
    enable: false  # 如果要处理HTTPS/TLS流量，请设置为true，并确保cert和key文件存在
    noBlock: false
    noBlockConnect: true
  socket:
    enableSync: false
    noBlockConnect: true
  log:
    enable: true 
    console: true
    level: debug
    filePath: "./proxy.log"
  threadPool:
    minWokers: 10
    maxWokers: 1000
    clearThreadTimeMs: 60000
    waitTimeMs: 1000
    stepAddThreadNumber: 10
server:
  host: 0.0.0.0
  port: 9800
  socket:
    bufferSize: 1024
    maxBacklog: 128
  tls:
    cert: cert.pem  # TLS证书文件路径（当tls.enable=true时必需）
    key: key.pem    # TLS私钥文件路径（当tls.enable=true时必需）
  connect:
    banIps: []
    allowedIps: []
client:
  host: 0.0.0.0
  port: 10808
  socket: 
    bufferSize: 1024
  tls:
    hostname: 0.0.0.0  # 目标服务器主机名（用于证书验证）
    sni: 0.0.0.0       # SNI扩展（通常与hostname相同）
    caCert:            # CA证书文件路径（可选，用于自定义CA验证）